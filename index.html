<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Con Đường Điện Biên — Hành trình gamification kể lại câu chuyện Chiến thắng Điện Biên Phủ 1954. Dựa trên tác phẩm 'Kể chuyện Điện Biên Phủ' (NXB Kim Đồng).">
  <meta name="keywords" content="Điện Biên Phủ, lịch sử Việt Nam, gamification, kể chuyện, AI, sách">
  <title>Con Đường Điện Biên — Hành Trình Lịch Sử</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500;600;700&family=Philosopher:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/gate.css">
  <link rel="stylesheet" href="styles/puzzle.css">
</head>
<body>
  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-content">
      <div class="header-left">
        <h1 class="app-title">
          <span class="title-icon">⭐</span>
          Con Đường Điện Biên
        </h1>
        <p class="app-subtitle">Hành Trình Lịch Sử 1954</p>
      </div>
      <div class="header-right">
        <button class="btn-gallery" id="btn-gallery" title="Bộ sưu tập">
          <span class="gallery-icon">🃏</span>
          <span class="gallery-label">Bộ Sưu Tập</span>
          <span class="gallery-count" id="gallery-count">0/6</span>
        </button>
        <button class="btn-badges" id="btn-badges" title="Huy hiệu">
          <span class="badges-icon">🏅</span>
          <span class="badges-label">Huy Hiệu</span>
          <span class="badges-count" id="badges-count">0/5</span>
        </button>
      </div>
    </div>
    <!-- Progress bar -->
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
    </div>
  </header>

  <!-- ===== MAIN: MAP VIEW ===== -->
  <main class="map-container" id="map-container">
    <div class="map-frame">
      <!-- Aged paper edge border -->
      <div class="map-border-edge"></div>

      <div class="map-bg">
        <!-- AI-generated topographic base map -->
        <img src="images/map/dien-bien-phu-map.png" alt="Bản đồ chiến dịch Điện Biên Phủ" class="map-base-image" draggable="false">

        <!-- SVG Overlay: labels, trail, markers, decorations -->
        <svg class="map-svg-overlay" id="map-svg-overlay" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
          <defs>
            <!-- Glow filter for trail -->
            <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
              <feGaussianBlur stdDeviation="3" result="blur"/>
              <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
            <!-- Drop shadow for labels -->
            <filter id="label-shadow" x="-10%" y="-10%" width="120%" height="120%">
              <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#f4e8c1" flood-opacity="0.9"/>
            </filter>
            <!-- Marker glow -->
            <radialGradient id="marker-glow-gradient">
              <stop offset="0%" stop-color="#f9a825" stop-opacity="0.6"/>
              <stop offset="100%" stop-color="#f9a825" stop-opacity="0"/>
            </radialGradient>
          </defs>

          <!-- ===== GEOGRAPHIC LABELS ===== -->
          <g class="geo-labels" filter="url(#label-shadow)">
            <!-- River label -->
            <text x="520" y="200" class="label-river" transform="rotate(-70, 520, 200)">Sông Nậm Rốm</text>

            <!-- Valley label -->
            <text x="600" y="420" class="label-valley">Mường Thanh</text>

            <!-- French strongpoint labels -->
            <text x="310" y="260" class="label-strongpoint">Béatrice</text>
            <text x="400" y="170" class="label-strongpoint">Gabrielle</text>
            <text x="760" y="370" class="label-strongpoint">Dominique</text>
            <text x="850" y="450" class="label-strongpoint">Éliane</text>
            <text x="550" y="540" class="label-strongpoint">Claudine</text>
            <text x="430" y="480" class="label-strongpoint">Huguette</text>
            <text x="600" y="690" class="label-strongpoint">Isabelle</text>

            <!-- Vietnamese place names -->
            <text x="330" y="290" class="label-viet-place">Him Lam</text>
            <text x="830" y="480" class="label-viet-place">Đồi A1</text>

            <!-- Airstrip indicator -->
            <line x1="420" y1="350" x2="700" y2="500" class="airstrip-line"/>
            <text x="560" y="410" class="label-airstrip" transform="rotate(25, 560, 410)">Sân bay Mường Thanh</text>
          </g>

          <!-- ===== TRAIL PATH (I→V) ===== -->
          <g class="trail-group">
            <!-- Trail shadow -->
            <path class="trail-shadow" d="M 170,140 C 230,200 280,250 350,310 S 480,400 580,430 S 720,470 800,490 S 880,530 920,570 S 950,620 950,650"/>
            <!-- Trail line with marching dots -->
            <path class="trail-line" id="trail-line" d="M 170,140 C 230,200 280,250 350,310 S 480,400 580,430 S 720,470 800,490 S 880,530 920,570 S 950,620 950,650" filter="url(#glow)"/>
            <!-- Moving dot along trail -->
            <circle class="trail-dot" r="5">
              <animateMotion dur="6s" repeatCount="indefinite" path="M 170,140 C 230,200 280,250 350,310 S 480,400 580,430 S 720,470 800,490 S 880,530 920,570 S 950,620 950,650"/>
            </circle>
          </g>

          <!-- ===== GATE MARKERS ===== -->
          <!-- Gate I: Ba Đình / Lời Kêu Gọi — top-left inset origin -->
          <g class="gate-marker-svg" id="gate-svg-1" data-gate="1" transform="translate(170, 140)">
            <circle class="marker-pulse" r="30" cx="0" cy="0"/>
            <circle class="marker-glow" r="22" cx="0" cy="0" fill="url(#marker-glow-gradient)"/>
            <circle class="marker-bg" r="18" cx="0" cy="0"/>
            <text class="marker-number" x="0" y="6" text-anchor="middle">I</text>
            <text class="marker-label" x="0" y="38" text-anchor="middle">Lời Kêu Gọi</text>
            <text class="marker-sublabel" x="0" y="52" text-anchor="middle">Quảng trường Ba Đình</text>
          </g>

          <!-- Gate II: Tuần Giáo supply trail — upper-left mountain pass -->
          <g class="gate-marker-svg" id="gate-svg-2" data-gate="2" transform="translate(350, 310)">
            <circle class="marker-pulse" r="30" cx="0" cy="0"/>
            <circle class="marker-glow" r="22" cx="0" cy="0" fill="url(#marker-glow-gradient)"/>
            <circle class="marker-bg" r="18" cx="0" cy="0"/>
            <text class="marker-number" x="0" y="6" text-anchor="middle">II</text>
            <text class="marker-label" x="0" y="38" text-anchor="middle">Cuộc Hành Quân</text>
            <text class="marker-sublabel" x="0" y="52" text-anchor="middle">Tuần Giáo → ĐBP</text>
          </g>

          <!-- Gate III: Mường Thanh valley center — trench network -->
          <g class="gate-marker-svg" id="gate-svg-3" data-gate="3" transform="translate(580, 430)">
            <circle class="marker-pulse" r="30" cx="0" cy="0"/>
            <circle class="marker-glow" r="22" cx="0" cy="0" fill="url(#marker-glow-gradient)"/>
            <circle class="marker-bg" r="18" cx="0" cy="0"/>
            <text class="marker-number" x="0" y="6" text-anchor="middle">III</text>
            <text class="marker-label" x="0" y="38" text-anchor="middle">Đào Chiến Hào</text>
            <text class="marker-sublabel" x="0" y="52" text-anchor="middle">Thung lũng Mường Thanh</text>
          </g>

          <!-- Gate IV: Him Lam + A1 — east hills -->
          <g class="gate-marker-svg" id="gate-svg-4" data-gate="4" transform="translate(800, 490)">
            <circle class="marker-pulse" r="30" cx="0" cy="0"/>
            <circle class="marker-glow" r="22" cx="0" cy="0" fill="url(#marker-glow-gradient)"/>
            <circle class="marker-bg" r="18" cx="0" cy="0"/>
            <text class="marker-number" x="0" y="6" text-anchor="middle">IV</text>
            <text class="marker-label" x="0" y="38" text-anchor="middle">56 Ngày Đêm</text>
            <text class="marker-sublabel" x="0" y="52" text-anchor="middle">Him Lam · Đồi A1</text>
          </g>

          <!-- Gate V: De Castries bunker — center-south command -->
          <g class="gate-marker-svg" id="gate-svg-5" data-gate="5" transform="translate(950, 650)">
            <circle class="marker-pulse" r="30" cx="0" cy="0"/>
            <circle class="marker-glow" r="22" cx="0" cy="0" fill="url(#marker-glow-gradient)"/>
            <circle class="marker-bg" r="18" cx="0" cy="0"/>
            <text class="marker-number" x="0" y="6" text-anchor="middle">V</text>
            <text class="marker-label" x="0" y="38" text-anchor="middle">Chiến Thắng</text>
            <text class="marker-sublabel" x="0" y="52" text-anchor="middle">Hầm De Castries</text>
          </g>

          <!-- ===== DECORATIVE ELEMENTS ===== -->
          <!-- Compass Rose — bottom-right -->
          <g class="compass-rose" transform="translate(1100, 720) scale(0.6)">
            <circle r="35" fill="none" stroke="#5c3d2e" stroke-width="1.5" opacity="0.6"/>
            <circle r="28" fill="none" stroke="#5c3d2e" stroke-width="0.8" opacity="0.4"/>
            <!-- N/S/E/W points -->
            <polygon points="0,-30 -5,-8 5,-8" fill="#c62828" opacity="0.8"/>
            <polygon points="0,30 -5,8 5,8" fill="#5c3d2e" opacity="0.6"/>
            <polygon points="30,0 8,-5 8,5" fill="#5c3d2e" opacity="0.6"/>
            <polygon points="-30,0 -8,-5 -8,5" fill="#5c3d2e" opacity="0.6"/>
            <!-- Diagonal points -->
            <polygon points="20,-20 2,-6 6,-2" fill="#5c3d2e" opacity="0.4"/>
            <polygon points="-20,-20 -2,-6 -6,-2" fill="#5c3d2e" opacity="0.4"/>
            <polygon points="20,20 2,6 6,2" fill="#5c3d2e" opacity="0.4"/>
            <polygon points="-20,20 -2,6 -6,2" fill="#5c3d2e" opacity="0.4"/>
            <!-- Labels -->
            <text x="0" y="-38" text-anchor="middle" class="compass-label compass-n">B</text>
            <text x="0" y="48" text-anchor="middle" class="compass-label">N</text>
            <text x="44" y="5" text-anchor="middle" class="compass-label">Đ</text>
            <text x="-44" y="5" text-anchor="middle" class="compass-label">T</text>
          </g>

          <!-- Scale Bar — bottom-left -->
          <g class="scale-bar" transform="translate(80, 750)">
            <line x1="0" y1="0" x2="100" y2="0" stroke="#5c3d2e" stroke-width="2"/>
            <line x1="0" y1="-5" x2="0" y2="5" stroke="#5c3d2e" stroke-width="1.5"/>
            <line x1="50" y1="-3" x2="50" y2="3" stroke="#5c3d2e" stroke-width="1"/>
            <line x1="100" y1="-5" x2="100" y2="5" stroke="#5c3d2e" stroke-width="1.5"/>
            <text x="0" y="16" class="scale-text" text-anchor="middle">0</text>
            <text x="50" y="16" class="scale-text" text-anchor="middle">2</text>
            <text x="100" y="16" class="scale-text" text-anchor="middle">4 km</text>
          </g>

          <!-- Title Cartouche — top-center -->
          <g class="title-cartouche" transform="translate(600, 50)">
            <rect x="-220" y="-30" width="440" height="60" rx="6" class="cartouche-bg"/>
            <rect x="-224" y="-34" width="448" height="68" rx="8" fill="none" stroke="#5c3d2e" stroke-width="1.5" opacity="0.5"/>
            <text x="0" y="2" text-anchor="middle" class="cartouche-title">BẢN ĐỒ CHIẾN DỊCH ĐIỆN BIÊN PHỦ</text>
            <text x="0" y="20" text-anchor="middle" class="cartouche-subtitle">— 1954 —</text>
          </g>
        </svg>
      </div>

      <!-- Map legend -->
      <div class="map-legend">
        <div class="legend-item">
          <span class="legend-dot active"></span> Đang mở
        </div>
        <div class="legend-item">
          <span class="legend-dot locked"></span> Chưa mở khóa
        </div>
        <div class="legend-item">
          <span class="legend-dot completed"></span> Hoàn thành
        </div>
      </div>
    </div>
  </main>

  <!-- ===== GATE VIEW (hidden, shown when a gate is entered) ===== -->
  <div class="gate-view" id="gate-view" style="display: none;">
    <!-- Populated dynamically by gate-renderer.js -->
  </div>

  <!-- ===== GALLERY MODAL ===== -->
  <div class="modal-overlay" id="gallery-modal" style="display: none;">
    <div class="modal-content gallery-content">
      <button class="modal-close" id="gallery-close">&times;</button>
      <h2 class="modal-title">🃏 Bộ Sưu Tập Nhân Vật</h2>
      <div class="card-gallery" id="card-gallery">
        <!-- Populated by gallery.js -->
      </div>
      <h2 class="modal-title badges-title">🏅 Huy Hiệu</h2>
      <div class="badge-gallery" id="badge-gallery">
        <!-- Populated by gallery.js -->
      </div>
    </div>
  </div>

  <!-- ===== COMPLETION SCREEN ===== -->
  <div class="completion-screen" id="completion-screen" style="display: none;">
    <!-- Populated after Gate 5 -->
  </div>

  <!-- ===== FOOTER ===== -->
  <footer class="app-footer">
    <p>Dựa trên tác phẩm <em>"Kể chuyện Điện Biên Phủ"</em> — NXB Kim Đồng</p>
    <p class="footer-contest">Cuộc thi "Cùng AI kể chuyện" · Ngày Sách và Văn hóa đọc 2026</p>
  </footer>

  <!-- ===== SCRIPTS ===== -->
  <script src="js/data.js"></script>
  <script src="js/game-engine.js"></script>
  <script src="js/map.js"></script>
  <script src="js/gallery.js"></script>
  <script src="js/gate-renderer.js"></script>
  <script src="js/card-reveal.js"></script>
  <script src="js/badge-reveal.js"></script>
  <script>
    // Initialize app
    document.addEventListener('DOMContentLoaded', () => {
      GameEngine.init();
      MapView.init();
      Gallery.init();

      // Completion screen after all 5 gates
      document.addEventListener('allGatesCompleted', showCompletionScreen);
    });

    function showCompletionScreen() {
      const screen = document.getElementById('completion-screen');
      if (!screen) return;

      const progress = GameEngine.getProgress();

      // Hide everything else
      document.getElementById('map-container').style.display = 'none';
      document.getElementById('gate-view').style.display = 'none';
      document.querySelector('.app-footer').style.display = 'none';

      screen.style.display = 'flex';
      screen.style.flexDirection = 'column';
      screen.style.alignItems = 'center';
      screen.style.justifyContent = 'center';
      screen.style.minHeight = 'calc(100vh - 80px)';
      screen.style.padding = '2rem';
      screen.style.textAlign = 'center';
      screen.style.background = 'linear-gradient(180deg, var(--parchment-light) 0%, var(--parchment) 50%, var(--parchment-dark) 100%)';
      screen.style.animation = 'fadeIn 0.5s ease';

      // Build all cards HTML
      let cardsHtml = '';
      for (let i = 1; i <= 5; i++) {
        const gate = GATES_DATA[i];
        cardsHtml += `
          <div style="text-align:center;">
            <img src="${gate.character.image}" alt="${gate.character.name}" style="width:80px; height:80px; border-radius:50%; border:3px solid var(--gold); object-fit:cover;">
            <div style="font-size:0.7rem; font-weight:700; margin-top:4px; color:var(--earth-dark);">${gate.character.name}</div>
          </div>
        `;
        if (i === 4 && gate.character2) {
          cardsHtml += `
            <div style="text-align:center;">
              <img src="${gate.character2.image}" alt="${gate.character2.name}" style="width:80px; height:80px; border-radius:50%; border:3px solid var(--gold); object-fit:cover;">
              <div style="font-size:0.7rem; font-weight:700; margin-top:4px; color:var(--earth-dark);">${gate.character2.name}</div>
            </div>
          `;
        }
      }

      // Build badges HTML
      let badgesHtml = '';
      for (let i = 1; i <= 5; i++) {
        const gate = GATES_DATA[i];
        badgesHtml += `
          <div style="text-align:center;">
            <div style="font-size:2rem;">${gate.badge.icon}</div>
            <div style="font-size:0.65rem; font-weight:700; color:var(--gold-dark);">${gate.badge.name}</div>
          </div>
        `;
      }

      screen.innerHTML = `
        <div style="font-size:4rem; margin-bottom:1rem;">🎉🇻🇳🎉</div>
        <h1 style="font-family:var(--font-display); color:var(--accent-red); font-size:clamp(1.8rem,5vw,2.8rem); margin-bottom:0.5rem;">
          Hoàn Thành Xuất Sắc!
        </h1>
        <p style="font-family:var(--font-accent); color:var(--earth-medium); font-size:1.1rem; margin-bottom:2rem; max-width:600px;">
          Bạn đã đi qua toàn bộ <strong>Con Đường Điện Biên</strong> — từ lời kêu gọi kháng chiến đến chiến thắng lịch sử "lừng lẫy năm châu, chấn động địa cầu."
        </p>

        <div style="display:flex; gap:2rem; justify-content:center; flex-wrap:wrap; margin-bottom:2rem;">
          <div style="background:var(--glass-bg); border:2px solid var(--gold); border-radius:16px; padding:1rem 2rem; text-align:center;">
            <div style="font-size:2rem; font-weight:900; color:var(--accent-red);">${progress.completedGates}/${progress.totalGates}</div>
            <div style="font-size:0.8rem; color:var(--earth-medium);">Cổng hoàn thành</div>
          </div>
          <div style="background:var(--glass-bg); border:2px solid var(--gold); border-radius:16px; padding:1rem 2rem; text-align:center;">
            <div style="font-size:2rem; font-weight:900; color:var(--accent-red);">${progress.totalCards}/${progress.maxCards}</div>
            <div style="font-size:0.8rem; color:var(--earth-medium);">Thẻ nhân vật</div>
          </div>
          <div style="background:var(--glass-bg); border:2px solid var(--gold); border-radius:16px; padding:1rem 2rem; text-align:center;">
            <div style="font-size:2rem; font-weight:900; color:var(--accent-red);">${progress.totalBadges}/${progress.maxBadges}</div>
            <div style="font-size:0.8rem; color:var(--earth-medium);">Huy hiệu</div>
          </div>
        </div>

        <h3 style="font-family:var(--font-display); color:var(--gold-dark); margin-bottom:1rem;">🃏 Bộ Sưu Tập Nhân Vật</h3>
        <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap; margin-bottom:2rem;">
          ${cardsHtml}
        </div>

        <h3 style="font-family:var(--font-display); color:var(--gold-dark); margin-bottom:1rem;">🏅 Huy Hiệu</h3>
        <div style="display:flex; gap:1.5rem; justify-content:center; flex-wrap:wrap; margin-bottom:2rem;">
          ${badgesHtml}
        </div>

        <div style="border-top:2px solid var(--khaki); padding-top:1.5rem; margin-top:1rem;">
          <p style="font-family:var(--font-accent); font-style:italic; color:var(--earth-medium); max-width:500px; margin:0 auto 1.5rem;">
            "Chiến thắng Điện Biên Phủ mãi mãi đi vào lịch sử dân tộc Việt Nam như một trong những chiến thắng vĩ đại nhất."
          </p>
          <div style="display:flex; gap:1rem; justify-content:center; flex-wrap:wrap;">
            <button class="btn-primary" onclick="GameEngine.resetProgress(); location.reload();">🔄 Khám phá lại</button>
            <button class="btn-secondary" onclick="Gallery.openGallery();">🃏 Xem bộ sưu tập</button>
          </div>
        </div>

        <p style="margin-top:2rem; font-size:0.75rem; color:var(--khaki);">
          Dựa trên tác phẩm "Kể chuyện Điện Biên Phủ" — NXB Kim Đồng<br>
          Cuộc thi "Cùng AI kể chuyện" · Ngày Sách và Văn hóa đọc 2026
        </p>
      `;

      // Trigger confetti
      if (typeof BadgeReveal !== 'undefined') {
        BadgeReveal.render(document.createElement('div'), { icon: '🏆', name: '', description: '' });
      }
    }
  </script>
</body>
</html>
